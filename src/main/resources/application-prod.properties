# PostgreSQL configuration. All credentials are required at startup; there are
# deliberately no committed production-secret defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Initial administrator configuration
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:admin@example.com}
admin.password=${ADMIN_PASSWORD}

# JWT signing
jwt.secret=${JWT_SECRET}

# Production-safe feature switches
mock.data.enabled=${MOCK_DATA_ENABLED:false}
spring.h2.console.enabled=false
spring.docker.compose.enabled=false

# This bootcamp reference has no migration layer. Deployments can override the
# policy when schema changes are managed separately.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Logging
logging.level.org.springframework=INFO
logging.level.com.okturan=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
