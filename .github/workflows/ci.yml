name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and package (Java 21)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Build container
        run: docker build --tag library-management-api:ci .

      - name: Smoke-test container startup
        run: |
          docker run --detach --name library-management-api-ci \
            --publish 127.0.0.1:18080:8080 \
            library-management-api:ci
          trap 'docker rm --force library-management-api-ci >/dev/null 2>&1 || true' EXIT

          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:18080/actuator/health | grep --quiet '"status":"UP"'; then
              exit 0
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' library-management-api-ci)" != "true" ]; then
              docker logs library-management-api-ci
              exit 1
            fi
            sleep 1
          done

          docker logs library-management-api-ci
          exit 1
